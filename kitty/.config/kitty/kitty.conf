include theme.conf

font_family      CaskaydiaMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
# font_size        12.0

scrollback_lines      10000
copy_on_select        yes
strip_trailing_spaces smart
enable_audio_bell     no

# window_padding_width    8
hide_window_decorations yes
confirm_os_window_close 0

linux_display_server wayland

# --- Minimal tab bar: flat, top, right-aligned, blends into terminal ---
tab_bar_edge          top
tab_bar_align         right
tab_bar_style         separator
tab_separator         " "
tab_bar_min_tabs      2
tab_title_template    "{index}:{tab.active_exe}"
tab_bar_margin_height 0.0 0.0

# active = blue text, inactive = muted; backgrounds match terminal bg so nothing pops
active_tab_foreground   #8aadf4
active_tab_background   #24273a
active_tab_font_style   normal
inactive_tab_foreground #6e738d
inactive_tab_background #24273a
inactive_tab_font_style normal
tab_bar_background      #24273a

# Jump to a tab by index (ctrl+shift+<n>)
map ctrl+shift+1 goto_tab 1
map ctrl+shift+2 goto_tab 2
map ctrl+shift+3 goto_tab 3
map ctrl+shift+4 goto_tab 4
map ctrl+shift+5 goto_tab 5
map ctrl+shift+6 goto_tab 6
map ctrl+shift+7 goto_tab 7
map ctrl+shift+8 goto_tab 8
map ctrl+shift+9 goto_tab 9
