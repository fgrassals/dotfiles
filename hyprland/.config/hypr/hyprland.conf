################
### MONITORS ###
################

# 4k external to the left at 1.5 scale, laptop monitor to the right
monitor = ,preferred,0x0,1.5
monitor = eDP-1,1920x1200@60,auto-right,1.25


###################
### MY PROGRAMS ###
###################

$terminal = foot
$fileManager = thunar
$menu = rofi -show drun


#################
### AUTOSTART ###
#################

exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_TYPE
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_TYPE
exec-once = /usr/lib/mate-polkit/polkit-mate-authentication-agent-1
exec-once = waybar
exec-once = hyprpaper
exec-once = hypridle
exec-once = mako
exec-once = swayosd-server
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = udiskie --no-tray


#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

# prefer wayland
env = GDK_BACKEND,wayland,x11,*
env = QT_QPA_PLATFORM,wayland;xcb
env = SDL_VIDEODRIVER,wayland

# draw qt apps like the others
env = QT_QPA_PLATFORMTHEME,qt5ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1

# xdg session
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# gpu acceleration
env = LIBVA_DRIVER_NAME,radeonsi

# electron apps use wayland
env = ELECTRON_OZONE_PLATFORM_HINT,auto


###################
### PERMISSIONS ###
###################

# See https://wiki.hypr.land/Configuring/Permissions/
# Please note permission changes here require a Hyprland restart and are not applied on-the-fly
# for security reasons

# ecosystem {
#   enforce_permissions = 1
# }

# permission = /usr/(bin|local/bin)/grim, screencopy, allow
# permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
# permission = /usr/(bin|local/bin)/hyprpm, plugin, allow


#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 3
    gaps_out = 6
    border_size = 2

    # col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg  # default
    col.active_border = rgba(7aa2f7ff) rgba(bb9af7ff) 45deg
    col.inactive_border = rgba(595959aa)

    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 0
    rounding_power = 2

    active_opacity = 1.0
    inactive_opacity = 0.85

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        # size = 3
        # passes = 1
        size = 6
        passes = 3
        vibrancy = 0.1696
    }
}
# https://wiki.hypr.land/Configuring/Variables/#animations
animations {
    enabled = yes, please :)

    # Default curves, see https://wiki.hypr.land/Configuring/Animations/#curves
    #        NAME,           X0,   Y0,   X1,   Y1
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    # Default animations, see https://wiki.hypr.land/Configuring/Animations/
    #           NAME,          ONOFF, SPEED, CURVE,        [STYLE]
    animation = global,        1,     10,    default
    animation = border,        1,     5.39,  easeOutQuint
    animation = windows,       1,     4.79,  easeOutQuint
    animation = windowsIn,     1,     4.1,   easeOutQuint, popin 87%
    animation = windowsOut,    1,     1.49,  linear,       popin 87%
    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          1,     3.03,  quick
    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     4,     easeOutQuint, fade
    animation = layersOut,     1,     1.5,   linear,       fade
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear
    animation = workspaces,    1,     1.94,  almostLinear, fade
    animation = workspacesIn,  1,     1.21,  almostLinear, fade
    animation = workspacesOut, 1,     1.94,  almostLinear, fade
    animation = zoomFactor,    1,     7,     quick
}

# Ref https://wiki.hypr.land/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
# workspace = w[tv1], gapsout:0, gapsin:0
# workspace = f[1], gapsout:0, gapsin:0
# windowrule {
#     name = no-gaps-wtv1
#     match:float = false
#     match:workspace = w[tv1]
#
#     border_size = 0
#     rounding = 0
# }
#
# windowrule {
#     name = no-gaps-f1
#     match:float = false
#     match:workspace = f[1]
#
#     border_size = 0
#     rounding = 0
# }

# See https://wiki.hypr.land/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hypr.land/Configuring/Master-Layout/ for more
master {
    new_status = master
}

misc {
    force_default_wallpaper = 2
    disable_hyprland_logo = true
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
}


#############
### INPUT ###
#############

input {
    kb_layout  = us
    kb_variant = altgr-intl
    kb_model   =
    kb_options = terminate:ctrl_alt_bksp
    kb_rules   =

    follow_mouse = 1
    sensitivity  = 0

    touchpad {
        natural_scroll       = false
        tap-to-click         = true
        tap-and-drag         = true
        drag_lock            = true
        disable_while_typing = true
    }
}

gesture = 3, horizontal, workspace


###################
### KEYBINDINGS ###
###################

$mainMod = SUPER

# Core
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, Q,      killactive
bind = $mainMod, M,      exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, E,      exec, $fileManager
bind = $mainMod, V,      togglefloating
bind = $mainMod, D,      exec, $menu
bind = $mainMod, P,      pseudo
bind = $mainMod, J,      layoutmsg, togglesplit

# Session
bind = $mainMod, L,          exec, hyprlock
bind = $mainMod SHIFT, M,    exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit

# Fullscreen / maximize
bind = $mainMod, F,       fullscreen, 0
bind = $mainMod SHIFT, F, fullscreen, 1

# Clipboard history picker
bind = $mainMod, C, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy

# Toggle internal laptop display (useful when docked)
bind = $mainMod SHIFT, D, exec, ~/.local/bin/toggle-laptop-screen.sh

# Focus — arrow keys
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d

# Focus — vim keys
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# Move window — arrow keys
bind = $mainMod SHIFT, left,  movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up,    movewindow, u
bind = $mainMod SHIFT, down,  movewindow, d

# Move window — vim keys
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

# Resize window — hold to repeat
binde = $mainMod CTRL, right, resizeactive,  30  0
binde = $mainMod CTRL, left,  resizeactive, -30  0
binde = $mainMod CTRL, up,    resizeactive,   0 -30
binde = $mainMod CTRL, down,  resizeactive,   0  30

# Focus and move windows between monitors
bind = $mainMod,       comma,  focusmonitor, -1
bind = $mainMod,       period, focusmonitor,  1
bind = $mainMod SHIFT, comma,  movewindow,   mon:-1
bind = $mainMod SHIFT, period, movewindow,   mon:+1

# Workspaces — switch
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Workspaces — move window to
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Special workspace (scratchpad)
bind = $mainMod,       S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace,         special:magic

# Scroll through workspaces with Super+scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1

# Move/resize windows with mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Volume — repeatable, works on lock screen, shows swayosd overlay
bindel = , XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise
bindel = , XF86AudioLowerVolume, exec, swayosd-client --output-volume lower
bindel = , XF86AudioMute,        exec, swayosd-client --output-volume mute-toggle
bindel = , XF86AudioMicMute,     exec, swayosd-client --input-volume mute-toggle

# Brightness — repeatable, works on lock screen, shows swayosd overlay
bindel = , XF86MonBrightnessUp,   exec, swayosd-client --brightness raise
bindel = , XF86MonBrightnessDown, exec, swayosd-client --brightness lower

# Media — works on lock screen
bindl = , XF86AudioNext,  exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay,  exec, playerctl play-pause
bindl = , XF86AudioPrev,  exec, playerctl previous

# Screenshots — Print key (laptop keyboard or remapped Q11 key)
bind = , Print,               exec, grim -g "$(slurp)" - | satty --filename -
bind = $mainMod, Print,       exec, grim - | satty --filename -
bind = $mainMod SHIFT, Print, exec, grim -g "$(hyprctl activewindow -j | jq -r '"\(.at[0]),\(.at[1]) \(.size[0])x\(.size[1])"')" - | satty --filename -

# Screenshots — Z binds for Q11 (no Print key)
bind = $mainMod, Z,       exec, grim -g "$(slurp)" - | satty --filename -
bind = $mainMod SHIFT, Z, exec, grim - | satty --filename -
bind = $mainMod CTRL, Z,  exec, grim -g "$(hyprctl activewindow -j | jq -r '"\(.at[0]),\(.at[1]) \(.size[0])x\(.size[1])"')" - | satty --filename -

# Lock on lid close
bindl = , switch:on:Lid Switch, exec, hyprlock


##############################
### WINDOWS AND WORKSPACES ###
##############################

# Prevent apps from maximising themselves — keeps Hyprland in control
windowrule {
    name        = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

# Fix XWayland drag bug — ghost windows stealing focus mid-drag
windowrule {
    name             = fix-xwayland-drags
    match:class      = ^$
    match:title      = ^$
    match:xwayland   = true
    match:float      = true
    match:fullscreen = false
    match:pin        = false
    no_focus         = true
}

# pavucontrol — volume mixer
windowrule = float on, size 900 600, center on, match:class ^(pavucontrol)$

# blueman-manager — bluetooth
windowrule = float on, size 700 500, center on, match:class ^(blueman-manager)$

# 1Password
windowrule = float on, size 1000 700, center on, match:class ^(1Password)$

# satty — screenshot editor
windowrule = float on, size 1200 800, center on, match:class ^(com.gabm.satty)$

# Picture-in-picture — float and pin on top
windowrule = float on, pin on, match:title ^(Picture-in-Picture)$

# Floating TUI tools launched from Waybar
windowrule = float on, center on, size 800 500, match:title ^(bluetui)$
windowrule = float on, center on, size 900 550, match:title ^(gazelle)$
windowrule = float on, center on, size 900 550, match:title ^(wiremix)$

# Thunar file operation dialogs
windowrule = float on, center on, match:title ^(File Operation Progress)$

# xdg-desktop-portal-gtk file picker
windowrule = float on, center on, size 900 600, match:class ^(xdg-desktop-portal-gtk)$
