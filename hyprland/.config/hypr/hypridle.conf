general {
    lock_cmd          = pidof hyprlock || hyprlock   # don't spawn multiple instances
    before_sleep_cmd  = loginctl lock-session        # lock immediately on suspend
    after_sleep_cmd   = hyprctl dispatch dpms on     # wake displays on resume
}

# Lock screen after 8 minutes of idle
listener {
    timeout   = 480
    on-timeout = loginctl lock-session
}

# Turn displays off after 10 minutes of idle
listener {
    timeout    = 600
    on-timeout = hyprctl dispatch dpms off
    on-resume  = hyprctl dispatch dpms on
}
