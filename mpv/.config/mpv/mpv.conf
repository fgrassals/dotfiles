# Video output — GPU with explicit Wayland context
vo=gpu
gpu-context=wayland

# Hardware decoding — auto-detect, fall back to software silently if unavailable
hwdec=auto-safe

# Quality
profile=gpu-hq

# Resume playback where you left off
save-position-on-quit=yes

# Subtitles — load any file with a similar name automatically
sub-auto=fuzzy

# Keep window open after playback ends
keep-open=yes
